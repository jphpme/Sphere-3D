# Dependabot configuration.
#
# Version-update PRs are currently disabled via `open-pull-requests-limit: 0`
# on every ecosystem: Dependabot still scans manifests and surfaces
# dependency alerts in the Security tab (and pairs with the CodeQL setup in
# .github/workflows/codeql.yml for code scanning), but it will not open
# routine bump PRs. To re-enable, raise the limit back above 0 per ecosystem.
#
# Note: this does NOT affect Dependabot *security* updates (the automated
# vulnerability-fix PRs) — those are governed by repo Settings → Code
# security, not by this file.
#
# Grouping is retained below so that if version updates are re-enabled,
# non-major (minor + patch) updates batch into a single PR per ecosystem
# while majors land individually (they may carry breaking changes, e.g. a
# wrangler v3 -> v4 bump).
version: 2
updates:
  # Frontend / tooling (package.json + package-lock.json at repo root)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    # 0 = version-update PRs disabled (scanning/alerts still run)
    open-pull-requests-limit: 0
    groups:
      npm-minor-and-patch:
        update-types:
          - minor
          - patch

  # Rust backend for the Tauri desktop app
  - package-ecosystem: cargo
    directory: /src-tauri
    schedule:
      interval: weekly
    # 0 = version-update PRs disabled (scanning/alerts still run)
    open-pull-requests-limit: 0
    groups:
      cargo-minor-and-patch:
        update-types:
          - minor
          - patch

  # Our own GitHub Actions workflows
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    # 0 = version-update PRs disabled (scanning/alerts still run)
    open-pull-requests-limit: 0
    groups:
      actions-all:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
