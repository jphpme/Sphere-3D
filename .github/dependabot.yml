# Dependabot configuration — keeps dependency security alerts and version
# updates flowing for every manifest in the repo. Pairs with the existing
# CodeQL setup (.github/workflows/codeql.yml) so we get both code scanning
# and dependency scanning.
#
# Grouping: non-major (minor + patch) updates are batched into a single PR
# per ecosystem to cut review noise; majors land as individual PRs because
# they may carry breaking changes (e.g. a wrangler v3 -> v4 bump).
version: 2
updates:
  # Frontend / tooling (package.json + package-lock.json at repo root)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      npm-minor-and-patch:
        update-types:
          - minor
          - patch

  # Rust backend for the Tauri desktop app
  - package-ecosystem: cargo
    directory: /src-tauri
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      cargo-minor-and-patch:
        update-types:
          - minor
          - patch

  # Our own GitHub Actions workflows
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions-all:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
